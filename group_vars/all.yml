---
# ==================== DB2 Configuration ====================

db2_version: "11.5.9"
db2_edition: "SERVER"

# Installer - Put the tar.gz in roles/db2luw_install/files/ or use AAP Files
db2_installer_filename: "v11.5.9_linuxx64_server_dec.tar.gz"

# Multiple instances support (add more as needed)
db2_instances:
  - instance_name: "db2inst1"
    fenced_name: "db2fenc1"
    group_name: "db2iadm1"
    fenced_group_name: "db2fadm1"
    password: "ChangeMeToSecurePassword123!"

  # Example of second instance
  # - instance_name: "db2inst2"
  #   fenced_name: "db2fenc2"
  #   group_name: "db2iadm1"
  #   fenced_group_name: "db2fadm1"
  #   password: "ChangeMeToSecurePassword123!"

# Optional
create_sample_db: true
db2_lic_agreement: "ACCEPT"
db2_install_type: "TYPICAL"

